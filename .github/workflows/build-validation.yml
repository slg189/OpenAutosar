name: Build Validation

# 构建门禁: host gcc 真实编译源码模块 (第一道闸, 无需 TriCore 工具链)
# + 配置/计划静态校验 + 目标(TriCore)构建图 dry-run + GoogleTest 单元测试。
# 注: 目标 ELF + QEMU 集成测试需 TriCore 工具链, 在自托管 runner 上跑 (见 ENV_VALIDATION_PLAN M4)。
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# 同一分支新推送时取消旧运行, 省额度
concurrency:
  group: build-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-gcc-compile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install build deps (scons + pyyaml)
        run: pip install -r requirements.txt

      - name: Toolchain info
        run: |
          gcc --version | head -1
          scons --version | head -2

      - name: Config + plan sanity (scons list)
        run: scons -Q list TOOLCHAIN=gcc PLATFORM=host

      - name: Host gcc compile (first gate)
        run: scons -Q compile TOOLCHAIN=gcc PLATFORM=host

      - name: Target build-graph (dry-run, stub TriCore toolchain)
        run: |
          mkdir -p "$RUNNER_TEMP/tcbin"
          for t in gcc ar ranlib objcopy objdump size; do
            printf '#!/bin/sh\nexit 0\n' > "$RUNNER_TEMP/tcbin/tricore-$t"
            chmod +x "$RUNNER_TEMP/tcbin/tricore-$t"
          done
          export PATH="$RUNNER_TEMP/tcbin:$PATH"
          export HIGHTEC_BIN="$RUNNER_TEMP/tcbin"
          scons -n -Q

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: GoogleTest 单元测试 (host, FetchContent googletest)
        run: python Tools/scripts/run_gtest.py
      - name: 归档测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gtest-report
          path: Projects/*/Reports/gtest_results.xml
          if-no-files-found: ignore
