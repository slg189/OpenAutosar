# =============================================================
# build.qemu.yaml — QEMU 仿真版（启用 Components/QEMU）
# 用法：scons CONFIG=build.qemu.yaml
# =============================================================
schema_version: "2.0"

project:
  name:            DemoProject
  derivative:      CYT4BF
  app_name_suffix: qemu

target:
  toolchain:  arm_gcc
  platform:   CortexM33
  build_type: Debug

global_defines:
  - PROJECT_DemoProject
  - QEMU_BUILD
  - DISABLE_REAL_HW

global_includes:
  - ${PROJECT_DIR}/Gen
  - ${PROJECT_DIR}/Cfg
  - ${BSW_DIR}/_Common/inc

bsw_modules:
  - name: Crc
    enabled: true
  - name: CanIf
    enabled: false                      # 待补 BSW/CanIf/SConscript 后开启
  - name: Os
    enabled: false                      # 待补 BSW/Os/SConscript 后开启

mcal_modules: []                        # QEMU 不需要真实 MCAL

components:
  - name: QEMU
    enabled: false                      # 待补 Components/QEMU/SConscript 后开启

linker:
  script: ""
  libraries: [m, c, nosys]

output:
  formats: [elf, bin, map]
  size_report: true
  compile_commands_json: true

codegen:
  enabled: false

docs:
  enabled: false

remote:
  enabled: false
