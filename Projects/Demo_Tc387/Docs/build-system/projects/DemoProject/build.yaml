    #     - ${PROJECT_DIR}/Cfg/BSW/Config/System/SystemExtract.arxml


# ── 文档自动生成 ★ NEW ───────────────────────────────────
docs:
  enabled: true
  output_dir: ${ROOT_DIR}/docs/api
  doxygen:
    enabled: false                     # 默认关，需要 doxygen 命令
    config_file: ${ROOT_DIR}/docs/Doxyfile.in
    html: true
    pdf:  false
  interface_extract:
    enabled: true
    output_format: markdown
  dependency_graph:
    enabled: true
    format: mermaid
  module_index:
    enabled: true
    title: "DemoProject 模块清单"


# ── 远程构建 ★ NEW ──────────────────────────────────────
remote:
  enabled: false                       # 冒烟阶段先关；需要时改 true
  default_target: build_server_01
  servers:
    - name: build_server_01
      host: 10.0.20.31
      port: 22
      user: ci
      auth: key
      key_file: ~/.ssh/id_rsa_ci
      remote_dir: /home/ci/work/OpenAutosar
      capabilities:
        - arm_gcc
        - arm_ghs
        - hightec
      jobs: 32

    - name: iar_license_host
      host: 10.0.20.45
      user: build
      auth: agent
      remote_dir: /data/build/OpenAutosar
      capabilities:
        - arm_iar
      jobs: 16

  sync:
    method: rsync
    excludes:
      - "Obj/"
      - "Out/"
      - "**/.git"
      - "**/__pycache__"
      - "docs/api/"
    pull_back:
      - "Projects/${PROJECT_NAME}/Out/"
      - "docs/api/"
