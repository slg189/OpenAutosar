# =============================================================
# Projects/Demo_Tc387/build.yaml  —  v3 主配置 (schema 3.0)
# 用户主要改这份: 模块开关 / source|lib / 代码生成 / 文档 / 远程。
#   产物 = <project.name>_<derivative>  ->  Demo_Tc387.elf
#
# 模型: layers/mode 统一表达五层; defaults.visibility=auto 时, 框架按
# "工作区是否可见源码"(manifest 决定) 自动选 编译/链接; 显式 mode 可覆盖。
# 显式清单 + 自动发现: 这里显式列模块; `scons list` 会提示工作区里未列入的模块。
# =============================================================

schema_version: "3.0"

project:
  name:            Demo            # + derivative => Demo_Tc387
  derivative:      Tc387
  app_name_suffix: ""

target:
  toolchain:  hightec             # GNU TriCore (tricore-gcc); 可 TOOLCHAIN=tasking; host 验证用 TOOLCHAIN=gcc PLATFORM=host
  platform:   AURIX2G             # Infineon AURIX TC3xx
  build_type: Release

defaults:
  visibility: auto                # auto | source | lib
  chip:       Tc387               # MCAL 等按芯片的层

global_defines:
  - AUTOSAR_CP
  - PROJECT_Demo_Tc387

global_includes:
  - ${MCAL_DIR}/inc
  - ${COMP_DIR}/Common/inc
  - ${PROJECT_DIR}/Gen

# ── 分层模块 (显式清单; 留空配置即用默认) ────────────────────
# 每模块三种结果 (由框架自动判定, mode 可覆盖):
#   source —— 有 .c/.S, 编译 (.o->Obj/, .a->Libs/; release 归档 .a+头文件 到 <Layer>_Libs)
#   lib    —— 有预编译 .a, 直接链接不编译; 若 .a 在模块目录(<Layer>/<Mod>/lib*.a)而非
#             <Layer>_Libs, release 会把 .a+头文件 更新到 <Layer>_Libs
#   header —— 只有 .h、无 .c 也无 .a, 仅提供 include 路径 (不编译不链接)
#
# release 时收集的头文件:
#   自动: <Layer>/<Mod>/inc/*.h            —— 模块静态 API 头 (始终收集)
#   显式: release_includes: [文件, ...]    —— 用户逐文件列出需额外发布的头文件
#         (支持 ${VAR} 展开; 如配置/生成头 CDD/CddPwm/gen/CddPwm_Cfg.h,
#          或工程 Gen 头 ${PROJECT_DIR}/Gen/BSW/CanIf/CanIf_Cfg.h)
layers:
  MCAL:
    Adc:  { mode: source, cflags: [-O3] }
    Port: { mode: source }
    Can:  { mode: lib }                  # 链接 MCAL_Libs/Can/libCan.a
  CDD:
    CddPwm:
      mode: source
      release_includes:                  # release 时把 gen 配置头也发布到 CDD_Libs/CddPwm/inc/
        - CDD/CddPwm/gen/CddPwm_Cfg.h
      # Optional build inputs for generated/config or delivered object code:
      # generated_source_dirs: [${PROJECT_DIR}/Gen/CDD/CddPwm/src]
      # generated_include_dirs: [${PROJECT_DIR}/Gen/CDD/CddPwm/inc]
      # extra_sources: [CDD/CddPwm/gen/CddPwm_PBcfg.c]
      # extra_objects: [CDD/CddPwm/obj/CddPwm_PBcfg.o]
      # public_includes: [${PROJECT_DIR}/Gen/CDD/CddPwm/inc]
    CddMotor:
      mode: source
      release_includes:
        - CDD/CddMotor/gen/CddMotor_Cfg.h
    CddSent:  { mode: lib }              # 链接 CDD_Libs/CddSent/libCddSent.a
  ASW:
    VehicleControl:   { mode: source }
    EnergyManagement: { mode: lib }      # 链接 ASW_Libs/EnergyManagement/...
  BSW:
    Os:  { mode: source, lib_name: libRtaOs }   # 供应商源码 (ETAS RTA-OS); 释放为 libRtaOs.a
    Com: { mode: source }                        # 供应商源码 (Vector COM)
    Crc: { mode: source }
    # CanIf:                                     # 示例: release 时额外发布配置/生成头文件
    #   mode: source
    #   release_includes:                        # 逐文件列出, 发布到 BSW_Libs/CanIf/inc/
    #     - ${PROJECT_DIR}/Gen/BSW/CanIf/CanIf_Cfg.h
    #     - ${PROJECT_DIR}/Gen/BSW/CanIf/CanIf_PBcfg.h
  Components:
    Common:   { mode: source }
    Mcu/Sbm:  { mode: source }           # 启动代码模块 (嵌套路径)

# ── 集成层 (基础工程师胶水代码) ─────────────────────────────
integration:
  enabled: true
  dir:     Integration

# ── 链接器 ────────────────────────────────────────────────
linker:
  script: ""                      # 有链接脚本时填 Ld/Demo_Tc387.ld
  libraries: []
  extra_flags: []

# ── 输出格式 ──────────────────────────────────────────────
output:
  formats: [elf, hex, map]
  size_report:           true
  compile_commands_json: true

# ── 代码生成 (编译前置) ────────────────────────────────────
codegen:
  enabled: true
  output_dir: ${PROJECT_DIR}/Gen
  generators:
    - name:    demo_echo
      type:    custom
      enabled: true
      cmd:     'echo [CODEGEN] Demo_Tc387 codegen placeholder'
      inputs:  []
      outputs_glob: ""
    - name:    etas_bsw
      type:    etas
      enabled: false
      # Set this path directly or define environment variable ISOLAR_B_CMD.
      tool_path: ""
      workspace: ${PROJECT_DIR}/Cfg/BSW
      project: ${PROJECT_DIR}/Cfg/BSW
      target: RTA-BSW
      output_dir: ${PROJECT_DIR}/Gen/BSW
      inputs:
        - ${PROJECT_DIR}/Cfg/BSW/Os.arxml
      # Public examples commonly use -generate with -p=<project/path> and
      # -t=<target>. Keep option names configurable for ETAS version variants.
      workspace_option: -data
      generate_option: -generate
      project_option: -p
      project_arg_style: joined
      target_option: -t
      target_arg_style: joined
      output_option: -o
      options: []
    # —— 接入真实工具 (示例, 默认关) ——
    # - { name: eb_tresos, type: eb_tresos, enabled: false,
    #     tool_path: C:/EB/tresos/bin/tresos_b.bat, workspace: ${PROJECT_DIR}/Cfg/MCAL, project: Demo_Tc387 }

# ── 文档自动生成 ─────────────────────────────────────────
docs:
  enabled: true
  output_dir: ${PROJECT_DIR}/Docs/api
  doxygen:
    enabled: false
    config_file: ${ROOT_DIR}/Tools/Doxygen/Doxyfile.in
  interface_extract: { enabled: true, output_format: markdown }
  dependency_graph:  { enabled: true, format: mermaid }
  module_index:      { enabled: true, title: "Demo_Tc387 模块清单" }

# ── 远程构建 ──────────────────────────────────────────────
remote:
  enabled: false
  default_target: build_server_01
  servers:
    - { name: build_server_01, host: 10.0.20.31, port: 22, user: ci, auth: key,
        key_file: ~/.ssh/id_rsa_ci, remote_dir: /home/ci/work/OpenAutosar,
        capabilities: [hightec, tasking], jobs: 16 }
  sync:
    method: rsync
    excludes: ["Obj/", "Out/", "**/.git", "**/__pycache__", "**/Docs/api/"]
    pull_back: ["Projects/Demo_Tc387/Out/", "Projects/Demo_Tc387/Docs/api/"]
